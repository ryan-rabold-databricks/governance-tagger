# Databricks App resource. Environment variables live in ../app.yaml
# (the runtime config the app pod reads). The SQL warehouse resource
# below is bound at bundle deploy time using the `sql_warehouse_id`
# bundle variable — DAB requires a concrete warehouse ID at deploy
# time, so the customer supplies one via `--var sql_warehouse_id=...`
# (CLI) or the Variables tab in the Bundle panel (workspace UI).
#
# The resource name `sql-warehouse` must match the `valueFrom:` lookup
# in ../app.yaml so the warehouse ID flows into DATABRICKS_WAREHOUSE_ID
# at runtime.
#
# source_code_path is `..` because the app sources live at the repo
# root, not in a `src/app/` subdir.

resources:
  apps:
    governance_tagger:
      name: ${var.app_name}
      description: "Curate Unity Catalog table and column descriptions, with centralized two-tier audit logging."
      source_code_path: ..
      resources:
        - name: sql-warehouse
          description: "SQL warehouse used by the app service principal for UC reads/writes and audit-table inserts."
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
