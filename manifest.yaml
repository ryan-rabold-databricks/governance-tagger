# Databricks App manifest. Declares the SQL warehouse as a resource the
# customer attaches on first deploy via the App UI ("Resources" tab) —
# the warehouse ID then flows into the DATABRICKS_WAREHOUSE_ID env var
# via the `valueFrom: "sql-warehouse"` reference in app.yaml.
#
# This pattern avoids hardcoding a workspace-specific warehouse ID
# anywhere in the repo.

version: 1
name: "governance-tagger"
description: "Curate Unity Catalog table and column descriptions with centralized audit logging."

resource_specs:
  - name: "sql-warehouse"
    description: "SQL warehouse used by the app service principal for UC reads/writes and audit-table inserts."
    sql_warehouse_spec:
      permission: "CAN_USE"

user_api_scopes:
  - "sql"
