command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: APP_NAME
    value: governance-tagger
  - name: AUDIT_CATALOG
    value: app_audit
  - name: AUDIT_SCHEMA
    value: app_security_logs
  - name: AUDIT_TABLE
    value: events
  # Warehouse is attached via manifest.yaml as a resource the customer
  # wires up in the App UI on first deploy. `valueFrom` resolves to the
  # warehouse ID at runtime.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"
