command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: APP_NAME
    value: governance-tagger
  - name: AUDIT_CATALOG
    value: app_audit
  - name: AUDIT_SCHEMA
    value: app_security_logs
  - name: AUDIT_TABLE
    value: events
  # Resolves to the ID of the `sql-warehouse` resource declared in the
  # bundle (resources/governance_tagger.app.yml). The bundle binds that
  # resource to a concrete warehouse at deploy time via the
  # `sql_warehouse_id` bundle variable.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"

# OAuth scopes the end user authorizes on first load. The app calls
# the SQL warehouse on-behalf-of-user (X-Forwarded-Access-Token), so
# the token must carry the `sql` scope.
user_api_scopes:
  - sql
